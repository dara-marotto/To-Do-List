services:
  api:
    build: .
    container_name: todo-list-api
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    volumes:
      - .:/app
    command: npm run start:dev

  postgres:
    image: postgres:16
    container_name: todo-list-db
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: todo-list-redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
